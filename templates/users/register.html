{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm p-4">
      <h1 class="mb-4 text-center">Registrar</h1>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          {{ form.username }}
        </div>

        <div class="mb-3">
          {{ form.email }}
        </div>

        <div class="mb-3">
          {{ form.password1 }}
        </div>

        <div class="mb-3">
          {{ form.password2 }}
        </div>

        <button type="submit" class="btn btn-success w-100">Cadastrar</button>
      </form>

      <div class="mt-3 text-center">
        <small>Já tem conta? <a href="{% url 'users:login' %}">Entre aqui</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
