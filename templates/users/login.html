{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm p-4">
      <h1 class="mb-4 text-center">Login</h1>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          {{ form.username }}
        </div>

        <div class="mb-3">
          {{ form.password }}
        </div>

        <button class="btn btn-primary w-100" type="submit">
          Entrar
        </button>
      </form>

      <div class="mt-3 text-center">
        <small>Não tem conta? <a href="{% url 'users:register' %}">Cadastre-se</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
