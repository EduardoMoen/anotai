{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Categorias</h1>
  <a class="btn btn-success" href="{% url 'notes:create_category' %}">Criar Categoria</a>
</div>

<div class="mb-3">
  <form method="get" class="d-flex">
    {{ search_form.name }}
    <button type="submit" class="btn btn-primary ms-2">Pesquisar</button>
  </form>
</div>

{% if categories %}
<div class="row g-3">
  {% for category in categories %}
  <div class="col-md-4">
    <div class="card shadow-sm h-100 p-3 d-flex flex-column justify-content-between">
      <h5 class="card-title">{{ category.name }}</h5>
      <div class="mt-3 d-flex justify-content-between">
        <a href="{% url 'notes:update_category' category.pk %}" class="btn btn-warning btn-sm">Editar</a>
        <a href="{% url 'notes:delete_category' category.pk %}" class="btn btn-danger btn-sm">Deletar</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p>Nenhuma categoria registrada. <a href="{% url 'notes:create_category' %}">Crie uma agora!</a></p>
{% endif %}
{% endblock %}
